app-id: io.github.srdets.ResolveMediaConverter
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk
command: resolve-media-converter
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
modules:
  - name: resolve-media-converter
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
    sources:
      - type: dir
        path: ../../
